# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - MyUAAcademiaB

on:
  #push:
  #  branches:
  #    - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      #- name: Install EF Core
      #  run: dotnet tool install --global dotnet-ef

      #- name: Apply database migrations
      #  run: dotnet ef database update --project MyUAAcademiaB
      #  env:
      #    DefaultConnection: ${{ secrets.DefaultConnection }}

      - name: Restore dependencies
        run: dotnet restore MyUAAcademiaB.sln

      - name: Build with dotnet
        run: dotnet build MyUAAcademiaB.sln --configuration Release --no-restore

      - name: dotnet test
        run: dotnet test MyUAAcademiaB.sln --configuration Release --no-restore --no-build --verbosity normal

      - name: dotnet publish
        run: dotnet publish MyUAAcademiaB -c Release --no-restore --no-build --property:PublishDir=./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./MyUAAcademiaB/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./MyUAAcademiaB/publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_10B9D65190D3417F800D26A76F1D43FC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8D2758A770564387A17A69F06B2A99F6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6975D9F1D5854F388BB5A156BB314E3C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'MyUAAcademiaB'
          slot-name: 'Production'
          package: ./MyUAAcademiaB/publish
        timeout-minutes: 5

      - name: Restart Azure Web App
        run: |
          az webapp restart --name MyUAAcademiaB --resource-group MA-AppService
        env:
          AZURE_WEBAPP_NAME: MyUAAcademiaB
          AZURE_RESOURCE_GROUP: MA-AppService
          