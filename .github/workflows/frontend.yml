name: Build and Deploy MyUA frontend on Vercel

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_USER_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'frontend/app/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend/app/

    steps:
      # 1. Retrieve the deposit code
      - name: Checkout code
        uses: actions/checkout@v5.0.1

      # 2. Installer Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5.0.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './frontend/app/package-lock.json'
        
      # 3. Installer les dépendances
      - name: Install dependencies
        run: npm ci

      # 4. Lancer le Lint
      - name: Run Lint
        run: npm run lint

      # 5. Lancer les tests Vitest
      - name: Run Vitest
        run: npm run test:run

      # 6. Installer playwright pour les tests e2e
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 7. Lancer les tests e2e
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      # 8. Build
      - name: Build
        run: npm run build

      # 9. Save build result
      - name: Save build result
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

      # 10. Playwright report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Playwright Report
          path: '**/playwright-report/'
          retention-days: 5

  vercel-deploy:
    needs: frontend-ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # 11. Retrieve the deposit code
      - name : Checkout code
        uses: actions/checkout@v5.0.1

      # 12. Download previous dist
      - name: Download dist builded in ci
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./frontend/app/dist/

      # 13. Deploy
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --prebuilt' 
          working-directory: ./